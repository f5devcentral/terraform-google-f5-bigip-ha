#cloud-config
# This is a base cloud-init template that will execute the F5 BIG-IP onboard script for simulated runtime-init download
# testing; this is not a valid configuration declaration for any other purpose.
# yamllint disable rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/canonical/cloud-init/main/cloudinit/config/schemas/versions.schema.cloud-config.json
---
write_files:
  # Want the onboarding script to think this simulated BIG-IP has already had it's system DB and management interface
  # configured; write empty sentinel files to skip those parts of onboarding.
  - path: /config/cloud/.setDB
    permissions: '0o644''
    owner: root:root
  - path: /config/cloud/.mgmtInterface
    permissions: '0o644''
    owner: root:root
  - path: /config/cloud/onboard.sh
    permissions: '0o755'
    owner: root:root
    encoding: gz+b64
    content: |
      {{ onboard_sh | indent(6) }}
  - path: /etc/systemd/system/f5-gce-onboard.service
    permissions: '0o644'
    owner: root:root
    content: |
      [Unit]
      Description=Simulated BIG-IP onboarding
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      RemainAfterExit=no
      Environment={% for k,v in onboard_env | items %}"{{ k }}={{ v }}"{% endfor %}
      ExecStart=/config/cloud/onboard.sh
      ExecStartPost=/usr/bin/systemctl disable f5-gce-onboard.service
      StandardOutput=journal+console
      StandardError=journal+console

      [Install]
      WantedBy=multi-user.target
  - path: "{{ runtime_init_config_path }}"
    permissions: '0o644'
    owner: root:root
    content: |
      {{ runtime_init_config | default('controls: { logLevel: debug }', true) | indent(6) }}

runcmd:
  - systemctl daemon-reload
  - systemctl enable f5-gce-onboard.service
  - systemctl start f5-gce-onboard.service
