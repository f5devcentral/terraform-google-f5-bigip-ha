# Minimal onboarding template for automate testing of BIG-IP HA clusters; only the management interface (nic1) and first
# data-plane interface (nic0) will be configured. This is NOT a full example or suitable for production use.
# yamllint disable-line rule:line-length
# yaml-language-server: $schema=https://raw.githubusercontent.com/F5Networks/f5-bigip-runtime-init/2.0.3/src/schema/base_schema.json
# spell-checker: disable
controls:
  logLevel: info
  extensionInstallDelayInMs: 60000
extension_packages:
  install_operations:
    - extensionType: do
      extensionHash:  45f583a352e86383bf1d8e4156fe44d0201e64386a395ff8c51ab1c53a2d1337
      extensionVersion: 1.45.0
      # yamllint disable-line rule:line-length
      extensionUrl: https://github.com/F5Networks/f5-declarative-onboarding/releases/download/v1.45.0/f5-declarative-onboarding-1.45.0-6.noarch.rpm
extension_services:
  service_operations:
    - extensionType: do
      type: inline
      value:
        # yamllint disable-line rule:line-length
        $schema: https://raw.githubusercontent.com/F5Networks/f5-declarative-onboarding/v1.45.0/src/schema/1.45.0/base.schema.json
        schemaVersion: 1.45.0
        class: Device
        async: true
        label: statefull-big-ip-ha-test-fixture
        Common:
          class: Tenant
          system:
            class: System
            autoPhonehome: false
            hostname: '{{{ INSTANCE_NAME }}}.{{{ DOMAIN_NAME }}}'
          dns:
            class: DNS
            nameServers:
              - 169.254.169.254
          ntp:
            class: NTP
            timezone: UTC
            servers:
              - 169.254.169.254
          admin:
            class: User
            userType: regular
            password: '{{{ ADMIN_PASSWORD }}}'
            shell: bash
            keys: ["{{{ SSH_KEYS }}}"]
          external:
            class: VLAN
            tag: 4094
            mtu: '{{{ EXTERNAL_MTU }}}'
            interfaces:
              - name: '1.0'
                tagged: false
          external_self_ip:
            class: SelfIp
            address: '{{{ EXTERNAL_ADDRESS }}}/32'
            vlan: external
            allowService:
              - 'tcp:80'
              - 'tcp:443'
              - 'tcp:4353'
              - 'udp:1026'
            trafficGroup: traffic-group-local-only
          external_gw_rt:
            class: Route
            target: external
            network: '{{{ EXTERNAL_GATEWAY_ADDRESS }}}/32'
            mtu: '{{{ EXTERNAL_MTU }}}'
          default:
            class: Route
            gw: '{{{ EXTERNAL_GATEWAY_ADDRESS }}}'
            network: 'default'
            mtu: '{{{ EXTERNAL_MTU }}}'
          provision:
            class: Provision
            ltm: nominal
    - extensionType: do
      type: inline
      value:
        # yamllint disable-line rule:line-length
        $schema: https://raw.githubusercontent.com/F5Networks/f5-declarative-onboarding/v1.45.0/src/schema/1.45.0/base.schema.json
        schemaVersion: 1.45.0
        class: Device
        async: true
        label: statefull-big-ip-ha-test-fixture
        Common:
          class: Tenant
          system:
            class: System
            autoPhonehome: false
            hostname: '{{{ INSTANCE_NAME }}}.{{{ DOMAIN_NAME }}}'
          dns:
            class: DNS
            nameServers:
              - 169.254.169.254
          ntp:
            class: NTP
            timezone: UTC
            servers:
              - 169.254.169.254
          admin:
            class: User
            userType: regular
            password: '{{{ ADMIN_PASSWORD }}}'
            shell: bash
            keys: ["{{{ SSH_KEYS }}}"]
          external:
            class: VLAN
            tag: 4094
            mtu: '{{{ EXTERNAL_MTU }}}'
            interfaces:
              - name: '1.0'
                tagged: false
          external_self_ip:
            class: SelfIp
            address: '{{{ EXTERNAL_ADDRESS }}}/32'
            vlan: external
            allowService:
              - 'tcp:80'
              - 'tcp:443'
              - 'tcp:4353'
              - 'udp:1026'
            trafficGroup: traffic-group-local-only
          external_gw_rt:
            class: Route
            target: external
            network: '{{{ EXTERNAL_GATEWAY_ADDRESS }}}/32'
            mtu: '{{{ EXTERNAL_MTU }}}'
          default:
            class: Route
            gw: '{{{ EXTERNAL_GATEWAY_ADDRESS }}}'
            network: 'default'
            mtu: '{{{ EXTERNAL_MTU }}}'
          configSync:
            class: ConfigSync
            configsyncIp: '{{{ EXTERNAL_ADDRESS }}}'
          failoverAddress:
            class: FailoverUnicast
            address: '{{{ EXTERNAL_ADDRESS }}}'
          failoverGroup:
            class: DeviceGroup
            type: sync-failover
            autoSync: true
            saveOnAutoSync: false
            networkFailover: true
            fullLoadOnSync: false
            asmSync: false
            members:
              - '{{{ BIG_IP_HA_PEER_NAME }}}.{{{ DOMAIN_NAME }}}'
              - '{{{ INSTANCE_NAME }}}.{{{ DOMAIN_NAME }}}'
            owner: '/Common/failoverGroup/members/{{{ BIG_IP_HA_PEER_OWNER_INDEX }}}'
          trustGroup:
            class: DeviceTrust
            localUsername: admin
            localPassword: '{{{ ADMIN_PASSWORD }}}'
            remoteHost: '{{{ BIG_IP_HA_PEER_ADDRESS }}}'
            remoteUsername: admin
            remotePassword: '{{{ ADMIN_PASSWORD }}}'
          provision:
            class: Provision
            ltm: nominal
post_onboard_enabled:
  - name: save_config
    type: inline
    commands:
      - tmsh save sys config
runtime_parameters:
  - name: DOMAIN_NAME
    type: static
    value: local
  - name: ADMIN_PASSWORD
    type: static
    value: '${admin_password}'
  - name: SSH_KEYS
    type: static
    value: '${pubkey}'
  - name: BIG_IP_HA_PEER_NAME
    type: url
    value: http://169.254.169.254/computeMetadata/v1/instance/attributes/bigip_ha_peer_name
    returnType: string
    headers:
      - name: Metadata-Flavor
        value: Google
  - name: BIG_IP_HA_PEER_ADDRESS
    type: url
    value: http://169.254.169.254/computeMetadata/v1/instance/attributes/bigip_ha_peer_address
    returnType: string
    headers:
      - name: Metadata-Flavor
        value: Google
  - name: BIG_IP_HA_PEER_OWNER_INDEX
    type: url
    value: http://169.254.169.254/computeMetadata/v1/instance/attributes/bigip_ha_peer_owner_index
    returnType: string
    headers:
      - name: Metadata-Flavor
        value: Google
  - name: INSTANCE_NAME
    type: url
    value: http://169.254.169.254/computeMetadata/v1/instance/name
    returnType: string
    headers:
      - name: Metadata-Flavor
        value: Google
  - name: EXTERNAL_ADDRESS
    type: metadata
    metadataProvider:
      environment: gcp
      type: network
      index: 0
      field: ip
      ipcalc: address
  - name: EXTERNAL_GATEWAY_ADDRESS
    type: metadata
    metadataProvider:
      environment: gcp
      type: network
      field: ip
      index: 0
      ipcalc: first
  - name: EXTERNAL_MTU
    type: url
    value: http://169.254.169.254/computeMetadata/v1/instance/network-interfaces/0/?recursive=true
    query: mtu
    returnType: number
    headers:
      - name: Metadata-Flavor
        value: Google
  - name: EXTERNAL_NETWORK_ADDRESS
    type: metadata
    metadataProvider:
      environment: gcp
      type: network
      index: 0
      field: ip
      ipcalc: base
  - name: EXTERNAL_NETWORK_BITMASK
    type: metadata
    metadataProvider:
      environment: gcp
      type: network
      index: 0
      field: ip
      ipcalc: bitmask
